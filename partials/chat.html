<!-- Chat Widget -->
<button class="chat-fab" id="chatFab" aria-label="Open chat">💬</button>
<div class="chat-window" id="chatWindow">
  <div class="chat-header">
    <div>
      <strong>The Six AI</strong>
      <div class="ds-label">Usually replies instantly</div>
    </div>
    <button id="chatClose" aria-label="Close">✕</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-msg bot">Hi there! 👋 How can we help you today?</div>
  </div>
  <form class="chat-input" id="chatForm">
    <input type="text" id="chatInput" placeholder="Type your message..." />
    <button type="submit">→</button>
  </form>
</div>
